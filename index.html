<style>
:root{
  --felt:#0d1f17; --felt-2:#13291e; --felt-line:rgba(245,233,200,.08);
  --cream:#f5e9c8; --cream-dim:#cdbf9a; --ink:#1a1410;
  --gold:#d9a441; --red:#c8453a; --teal:#3fae9b; --violet:#8b6fc4;
  --shadow:0 10px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Segoe UI",system-ui,sans-serif;
  background:
    radial-gradient(120% 90% at 50% -10%, var(--felt-2), var(--felt) 60%),
    var(--felt);
  color:var(--cream); min-height:100dvh;
  padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);
  overscroll-behavior:none;
}
.wrap{max-width:760px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.brand{font-weight:900;letter-spacing:-.04em;font-size:clamp(34px,11vw,64px);
  line-height:.9;text-align:center;margin:18px 0 4px;font-family:"Arial Black",Arial,sans-serif}
.brand span{color:var(--gold)}
.tag{text-align:center;color:var(--cream-dim);font-size:13px;letter-spacing:.18em;
  text-transform:uppercase;margin-bottom:24px}
.card-ui{background:var(--felt-2);border:1px solid var(--felt-line);border-radius:18px;
  padding:22px;box-shadow:var(--shadow)}
h2{font-size:15px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-dim);
  margin-bottom:14px;font-weight:700}
label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--cream-dim);margin:0 0 6px}
input{width:100%;background:var(--felt);border:1px solid var(--felt-line);color:var(--cream);
  font-size:17px;padding:13px 14px;border-radius:11px;outline:none;font-family:inherit}
input:focus{border-color:var(--gold)}
.btn{display:block;width:100%;border:none;border-radius:12px;padding:15px;font-size:16px;
  font-weight:800;letter-spacing:.02em;cursor:pointer;color:var(--ink);
  background:var(--gold);margin-top:14px;transition:transform .08s,filter .15s;font-family:inherit}
.btn:active{transform:scale(.985)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--cream);border:1px solid var(--felt-line)}
.btn.red{background:var(--red);color:#fff}
.btn.teal{background:var(--teal);color:var(--ink)}
.row{display:flex;gap:12px}.row>*{flex:1}
.divider{display:flex;align-items:center;gap:12px;color:var(--cream-dim);
  font-size:11px;letter-spacing:.2em;margin:20px 0;text-transform:uppercase}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--felt-line)}
.hidden{display:none!important}
.code-box{text-align:center;margin:6px 0 4px}
.code-box .code{font-family:"Courier New",monospace;font-size:38px;font-weight:900;
  letter-spacing:.22em;color:var(--gold)}
#qr{display:flex;justify-content:center;margin:18px 0 6px}
#qr canvas{border-radius:12px;border:6px solid #fff}
.hint{font-size:13px;color:var(--cream-dim);text-align:center;line-height:1.5}
.players{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.pl{display:flex;align-items:center;gap:10px;background:var(--felt);padding:11px 14px;
  border-radius:11px;font-size:15px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--teal);flex:none}
.dot.off{background:var(--red)}
.pl .you{margin-left:auto;font-size:11px;color:var(--gold);font-weight:800;letter-spacing:.1em}
.pl .host{margin-left:auto;font-size:11px;color:var(--cream-dim);letter-spacing:.1em}

/* ===== GAME ===== */
#game{flex:1;display:flex;flex-direction:column;gap:14px}
.scoreboard{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.scoreboard::-webkit-scrollbar{display:none}
.score-chip{flex:none;background:var(--felt-2);border:1px solid var(--felt-line);
  border-radius:12px;padding:9px 13px;min-width:92px;position:relative}
.score-chip.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.score-chip.busted{opacity:.45}
.score-chip.stayed{border-color:var(--teal)}
.score-chip .nm{font-size:12px;color:var(--cream-dim);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:120px}
.score-chip .tot{font-size:24px;font-weight:900;color:var(--cream)}
.score-chip .st{font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  position:absolute;top:8px;right:10px;font-weight:800}
.st.b{color:var(--red)}.st.s{color:var(--teal)}.st.f{color:var(--gold)}

.turn-banner{text-align:center;font-size:14px;color:var(--cream-dim);letter-spacing:.05em}
.turn-banner b{color:var(--gold)}

.table{flex:1;background:radial-gradient(110% 80% at 50% 20%,var(--felt-2),var(--felt));
  border:1px solid var(--felt-line);border-radius:18px;padding:18px;display:flex;
  flex-direction:column;gap:14px;min-height:280px;box-shadow:var(--shadow)}
.hand-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cream-dim)}
.hand{display:flex;flex-wrap:wrap;gap:8px;min-height:84px;align-content:flex-start}
.gc{width:56px;height:78px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;font-weight:900;font-size:26px;position:relative;
  box-shadow:0 4px 10px rgba(0,0,0,.35);animation:flip .42s cubic-bezier(.2,.7,.3,1)}
@keyframes flip{from{transform:rotateY(90deg) scale(.8);opacity:0}to{transform:none;opacity:1}}
.gc.num{background:var(--cream);color:var(--ink)}
.gc.mod{background:var(--gold);color:var(--ink);font-size:20px}
.gc.act{font-size:13px;letter-spacing:.04em;text-align:center;line-height:1.05;padding:4px}
.gc.act.freeze{background:var(--teal);color:var(--ink)}
.gc.act.flip3{background:var(--violet);color:#fff}
.gc.act.sc{background:#5a8fd6;color:#fff}
.gc .corner{position:absolute;top:4px;left:5px;font-size:10px;font-weight:700;opacity:.55}
.dup{outline:3px solid var(--red);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* Spotlight : main du joueur en train de jouer (au-dessus de la sienne).
   min-height fixe -> pas de layout shift quand c'est ton tour. */
.spotlight{background:rgba(0,0,0,.18);border:1px solid var(--felt-line);border-radius:12px;
  padding:10px 12px;min-height:94px;transition:opacity .2s}
.spotlight.empty{opacity:.45}
.spotlight .hand-label{margin-bottom:8px}
.spotlight .hand-label b{color:var(--gold)}
.hand.mini{min-height:60px;gap:6px}
.gc.sm{width:42px;height:60px;font-size:20px;border-radius:8px}
.gc.mod.sm{font-size:15px}
.gc.act.sm{font-size:9px}
.gc.sm .corner{font-size:8px;top:3px;left:4px}

.flip-stat{display:flex;justify-content:space-between;align-items:center;font-size:13px;
  color:var(--cream-dim)}
.flip-stat b{color:var(--cream);font-size:15px}
.pips{display:flex;gap:5px}
.pip{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--cream-dim)}
.pip.on{background:var(--gold);border-color:var(--gold)}

.actions{display:flex;gap:12px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--cream);padding:13px 22px;border-radius:30px;
  font-size:15px;font-weight:700;box-shadow:var(--shadow);opacity:0;pointer-events:none;
  transition:.3s;z-index:50;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(5,12,9,.82);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:24px;z-index:40}
.overlay .panel{background:var(--felt-2);border:1px solid var(--felt-line);border-radius:18px;
  padding:26px;max-width:420px;width:100%;text-align:center;box-shadow:var(--shadow)}
.overlay h3{font-size:24px;font-weight:900;margin-bottom:6px}
.big-num{font-size:64px;font-weight:900;color:var(--gold);margin:8px 0}
.foot{text-align:center;color:var(--cream-dim);font-size:11px;margin-top:18px;letter-spacing:.05em}
.foot a{color:var(--cream-dim)}
.choose-target{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.choose-target button{background:var(--felt);border:1px solid var(--felt-line);color:var(--cream);
  padding:13px;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.choose-target button:active{background:var(--gold);color:var(--ink)}
</style>

<body>
<div class="wrap">

  <!-- LOBBY -->
  <div id="lobby">
    <div class="brand">FLIP <span>7</span></div>
    <div class="tag">Multijoueur · Réseau local</div>

    <!-- HOME -->
    <div id="home" class="card-ui">
      <label for="name">Ton pseudo</label>
      <input id="name" maxlength="14" placeholder="Guillaume" autocomplete="off">
      <button class="btn" id="createBtn">Créer une partie</button>
      <div class="divider">ou</div>
      <label for="joinCode">Rejoindre avec un code</label>
      <input id="joinCode" maxlength="5" placeholder="ABCDE" autocomplete="off"
        style="text-transform:uppercase;letter-spacing:.2em;font-family:'Courier New',monospace">
      <button class="btn ghost" id="joinBtn">Rejoindre</button>
    </div>

    <!-- WAITING ROOM -->
    <div id="room" class="card-ui hidden">
      <h2>Salon</h2>
      <div class="code-box">
        <div class="hint">Code de partie</div>
        <div class="code" id="roomCode">—</div>
      </div>
      <div id="qr"></div>
      <p class="hint" id="roomHint">Les autres scannent le QR ou tapent le code sur le même réseau.</p>
      <div class="players" id="playerList"></div>
      <button class="btn" id="startBtn">Démarrer la partie</button>
      <p class="hint" id="waitHint" style="margin-top:12px"></p>
    </div>

    <div class="foot">Flip 7 · jeu de The Op. App non officielle pour jouer entre potes.</div>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div class="scoreboard" id="scoreboard"></div>
    <div class="turn-banner" id="turnBanner"></div>
    <div class="table">
      <div id="spotlight" class="spotlight empty">
        <div class="hand-label" id="spotLabel">&nbsp;</div>
        <div class="hand mini" id="spotHand"></div>
      </div>
      <div>
        <div class="hand-label">Ta main</div>
        <div class="hand" id="hand"></div>
      </div>
      <div class="flip-stat">
        <span>Cartes différentes <b id="flipCount">0</b>/7</span>
        <div class="pips" id="pips"></div>
      </div>
      <div class="flip-stat">
        <span>Points en jeu ce tour</span><b id="roundPts">0</b>
      </div>
      <div style="flex:1"></div>
      <div class="actions">
        <button class="btn teal" id="hitBtn">Tirer une carte</button>
        <button class="btn ghost" id="stayBtn">Rester</button>
      </div>
    </div>
    <div class="turn-banner" id="targetScore">Objectif : 200 points</div>
  </div>

</div>

<div class="toast" id="toast"></div>
<div id="overlayRoot"></div>

<script>
"use strict";
/* =========================================================================
   FLIP 7 — PWA WebRTC P2P (architecture étoile : l'hôte est autorité)
   Tout le moteur de jeu tourne chez l'hôte. Les joueurs envoient des
   intentions ("hit","stay","pick") et reçoivent l'état complet à chaque maj.
   ========================================================================= */

// ---------- Helpers ----------
const $ = id => document.getElementById(id);
const rid = (n=5)=>{const a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s="";for(let i=0;i<n;i++)s+=a[Math.random()*a.length|0];return s;};
function toast(msg,ms=2200){const t=$("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),ms);}
const PREFIX="flip7lan-"; // namespace PeerJS pour éviter les collisions d'ID

// ---------- État réseau ----------
let peer=null, isHost=false, myName="", myId="";
let conns={};        // hôte: id -> DataConnection
let hostConn=null;   // client: connexion vers l'hôte
let lastState=null;

// =========================================================================
//  MOTEUR DE JEU (n'existe que chez l'hôte)
// =========================================================================
const TARGET=200;
function buildDeck(){
  const d=[];
  // Cartes numériques : la valeur N apparaît N fois (sauf 0 -> 1 carte). Règle officielle.
  for(let n=0;n<=12;n++){const c=(n===0)?1:n;for(let i=0;i<c;i++)d.push({t:"num",v:n});}
  // Modificateurs
  [["+2",2],["+4",4],["+6",6],["+8",8],["+10",10]].forEach(([l,v])=>d.push({t:"mod",v,label:l}));
  d.push({t:"mod",v:0,label:"x2",mult:true});
  // Cartes action (x3 chacune)
  for(let i=0;i<3;i++){d.push({t:"freeze"});d.push({t:"flip3"});d.push({t:"sc"});} // sc = Second Chance
  return d;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

let G=null; // game state (hôte)
function newGame(players){
  G={
    players: players.map(p=>({id:p.id,name:p.name,total:0,
       hand:[],busted:false,stayed:false,frozen:false,flip7:false,
       hasSC:false,roundDone:false})),
    deck:shuffle(buildDeck()), discard:[],
    turn:0, roundNo:1, phase:"play", // play | roundEnd | gameOver
    pending:null, // {type:'flip3'|'freeze'|'sc', actor, remaining, ...} pour cartes action
    msg:"",
  };
  startRound(true);
  pushState(); // diffuser l'état initial + basculer l'UI vers le jeu
}
function activePlayers(){return G.players.filter(p=>!p.roundDone);}
function curPlayer(){return G.players[G.turn];}

function startRound(first){
  G.players.forEach(p=>{p.hand=[];p.busted=false;p.stayed=false;p.frozen=false;p.flip7=false;p.hasSC=false;p.roundDone=false;});
  G.turn=0; G.phase="play"; G.pending=null;
  if(!first) G.roundNo++;
  dealOpening(); // chaque joueur reçoit une première carte
  // premier joueur = celui qui suit le dealer ; on garde simple : index 0
  G.msg=`Manche ${G.roundNo} — à ${curPlayer().name} de jouer`;
}
// Distribue 1 carte à chaque joueur. On évite Freeze/Flip 3 à la distribution
// (elles exigent un ciblage immédiat) : on les remet sous la pioche et on retire.
function dealOpening(){
  G.players.forEach(p=>{
    let card=null,guard=0;
    do{
      card=drawCard();
      if(card&&(card.t==="freeze"||card.t==="flip3")){G.deck.unshift(card);card=null;}
    }while(!card && guard++<60);
    if(card) applyCardToPlayer(p,card);
  });
}
function drawCard(){
  if(G.deck.length===0){G.deck=shuffle(G.discard);G.discard=[];}
  return G.deck.pop();
}
function handHasValue(p,v){return p.hand.some(c=>c.t==="num"&&c.v===v);}
function distinctNums(p){return new Set(p.hand.filter(c=>c.t==="num").map(c=>c.v)).size;}

function roundScore(p){
  let sum=p.hand.filter(c=>c.t==="num").reduce((s,c)=>s+c.v,0);
  const mods=p.hand.filter(c=>c.t==="mod");
  if(mods.some(m=>m.mult)) sum*=2;
  sum+=mods.filter(m=>!m.mult).reduce((s,m)=>s+m.v,0);
  if(p.flip7) sum+=15;
  return sum;
}

function advanceTurn(){
  if(G.pending) return; // une carte action est en attente de résolution
  // fin de manche si plus personne d'actif
  if(activePlayers().length===0){endRound();return;}
  let n=G.turn;
  do{ n=(n+1)%G.players.length; }while(G.players[n].roundDone);
  G.turn=n;
  G.msg=`À ${curPlayer().name} de jouer`;
}

function applyCardToPlayer(p,card){
  // retourne {bust:bool, special:string|null}
  if(card.t==="num"){
    if(handHasValue(p,card.v)){
      if(p.hasSC){ // Second Chance annule le doublon
        p.hasSC=false; G.discard.push(card);
        const sc=p.hand.findIndex(c=>c.t==="sc"); if(sc>=0)G.discard.push(p.hand.splice(sc,1)[0]);
        return {bust:false,special:"sc-used",card};
      }
      p.hand.push(card); p.busted=true; p.roundDone=true;
      return {bust:true,special:null};
    }
    p.hand.push(card);
    if(distinctNums(p)>=7){p.flip7=true;p.roundDone=true;return {bust:false,special:"flip7"};}
    return {bust:false,special:null};
  }
  if(card.t==="mod"){p.hand.push(card);return {bust:false,special:null};}
  if(card.t==="sc"){
    if(p.hasSC){ // déjà une SC -> doit la donner ; simplifié : on défausse
      G.discard.push(card); return {bust:false,special:"sc-extra"};
    }
    p.hasSC=true; p.hand.push(card); return {bust:false,special:null};
  }
  if(card.t==="freeze"){
    return {bust:false,special:"freeze",card};
  }
  if(card.t==="flip3"){
    return {bust:false,special:"flip3",card};
  }
}

// Action principale : un joueur tire
function hostHit(pid){
  if(G.phase!=="play"||G.pending) return;
  const p=curPlayer(); if(p.id!==pid||p.roundDone) return;
  const card=drawCard();
  const r=applyCardToPlayer(p,card);

  if(r.special==="freeze"){
    G.pending={type:"freeze",actor:p.id,card};
    G.msg=`${p.name} a pioché Freeze : choisir un joueur à geler`;
    pushState(); return;
  }
  if(r.special==="flip3"){
    G.pending={type:"flip3",actor:p.id,card,remaining:3,target:null};
    G.msg=`${p.name} a pioché Flip 3 : choisir un joueur qui tire 3 cartes`;
    pushState(); return;
  }
  if(r.bust){
    p.hand[p.hand.length-1].dup=true;
    G.discard.push(...p.hand.splice(0)); 
    G.msg=`💥 ${p.name} a buste !`;
    advanceTurn(); pushState(); return;
  }
  if(r.special==="flip7"){
    p.total+=roundScore(p);
    G.msg=`🎉 ${p.name} fait FLIP 7 ! +${roundScore(p)} pts — manche terminée`;
    endRound(); return;
  }
  if(r.special==="sc-used"){ G.msg=`${p.name} évite le bust grâce à Second Chance`; }
  advanceTurn(); pushState();
}

function hostStay(pid){
  if(G.phase!=="play"||G.pending) return;
  const p=curPlayer(); if(p.id!==pid||p.roundDone) return;
  p.stayed=true;p.roundDone=true;
  p.total+=roundScore(p);
  G.msg=`${p.name} reste (+${roundScore(p)} pts)`;
  advanceTurn(); pushState();
}

// Résolution d'une cible (freeze/flip3) choisie par l'acteur
function hostPick(pid,targetId){
  if(!G.pending||G.pending.actor!==pid) return;
  const target=G.players.find(x=>x.id===targetId);
  if(!target||target.roundDone) return;
  const pend=G.pending;

  if(pend.type==="freeze"){
    G.discard.push(pend.card);
    target.total+=roundScore(target);
    target.frozen=true;target.roundDone=true;
    G.msg=`❄️ ${target.name} est gelé (+${roundScore(target)} pts sécurisés)`;
    G.pending=null;
    if(activePlayers().length===0){endRound();return;}
    advanceTurn(); pushState(); return;
  }

  if(pend.type==="flip3"){
    G.discard.push(pend.card);
    pend.target=targetId;
    // on tire jusqu'à 3 cartes pour la cible, en gérant bust/flip7 immédiats
    let done=0;
    while(done<3){
      const card=drawCard();
      const r=applyCardToPlayer(target,card);
      done++;
      if(r.special==="freeze"||r.special==="flip3"){
        // chaîne d'action : la cible doit à son tour choisir. On empile.
        target._chain=(target._chain||0); 
        G.pending={type:r.special,actor:target.id,card,remaining:3-done,parent:pend};
        G.msg=`${target.name} pioche ${r.special==="freeze"?"Freeze":"Flip 3"} pendant Flip 3`;
        pushState(); return;
      }
      if(r.bust){
        target.hand[target.hand.length-1].dup=true;
        G.discard.push(...target.hand.splice(0));
        G.msg=`💥 ${target.name} buste sur Flip 3 !`;
        break;
      }
      if(r.special==="flip7"){
        target.total+=roundScore(target);
        G.msg=`🎉 ${target.name} FLIP 7 sur Flip 3 !`;
        G.pending=null; endRound(); return;
      }
    }
    G.pending=null;
    if(!target.roundDone) G.msg=`${target.name} survit au Flip 3`;
    if(activePlayers().length===0){endRound();return;}
    advanceTurn(); pushState(); return;
  }
}

function endRound(){
  G.pending=null;
  // vérifier victoire
  const winner=G.players.filter(p=>p.total>=TARGET).sort((a,b)=>b.total-a.total)[0];
  if(winner){
    G.phase="gameOver"; G.msg=`🏆 ${winner.name} gagne avec ${winner.total} pts !`;
    G.winner=winner.name; pushState(); return;
  }
  G.phase="roundEnd";
  G.msg="Manche terminée";
  pushState();
  setTimeout(()=>{startRound(false);pushState();},2600);
}

// =========================================================================
//  SYNCHRONISATION RÉSEAU
// =========================================================================
function snapshot(){
  return {type:"state",g:{
    players:G.players.map(p=>({id:p.id,name:p.name,total:p.total,hand:p.hand,
      busted:p.busted,stayed:p.stayed,frozen:p.frozen,flip7:p.flip7,
      hasSC:p.hasSC,roundDone:p.roundDone})),
    turn:G.turn,roundNo:G.roundNo,phase:G.phase,pending:G.pending?{type:G.pending.type,actor:G.pending.actor}:null,
    msg:G.msg,winner:G.winner||null,deckLeft:G.deck.length
  }};
}
function pushState(){
  const snap=snapshot();
  broadcast(snap);
  applyState(snap.g); // l'hôte met aussi à jour sa propre UI
}
function broadcast(obj){Object.values(conns).forEach(c=>{try{c.send(obj);}catch(e){}});}

// =========================================================================
//  RENDU UI (commun hôte + clients, piloté par lastState)
// =========================================================================
function applyState(g){
  lastState=g;
  $("lobby").classList.add("hidden");
  $("game").classList.remove("hidden");
  $("turnBanner")&&renderGame(g);
}
function valColor(v){const c=["#9aa0a6","#c8453a","#d9a441","#e0843c","#3fae9b","#5a8fd6","#8b6fc4","#c44d8f","#4caf50","#ff7043","#26a69a","#7e57c2","#ec407a"];return c[v]||"#888";}

function gameCardEl(c,small){
  const d=document.createElement("div");
  const sm=small?" sm":"";
  if(c.t==="num"){d.className="gc num"+sm+(c.dup?" dup":"");d.textContent=c.v;
    d.style.color=valColor(c.v);
    const cr=document.createElement("span");cr.className="corner";cr.textContent=c.v;cr.style.color=valColor(c.v);d.appendChild(cr);}
  else if(c.t==="mod"){d.className="gc mod"+sm;d.textContent=c.label;}
  else if(c.t==="freeze"){d.className="gc act freeze"+sm;d.textContent="FREEZE";}
  else if(c.t==="flip3"){d.className="gc act flip3"+sm;d.textContent="FLIP 3";}
  else if(c.t==="sc"){d.className="gc act sc"+sm;d.textContent="2ND CHANCE";}
  return d;
}

function renderGame(g){
  // scoreboard
  const sb=$("scoreboard");sb.innerHTML="";
  g.players.forEach((p,i)=>{
    const chip=document.createElement("div");
    chip.className="score-chip"+(i===g.turn&&g.phase==="play"?" active":"")
      +(p.busted?" busted":"")+(p.stayed||p.frozen?" stayed":"");
    let st="";
    if(p.flip7)st='<span class="st f">FLIP7</span>';
    else if(p.busted)st='<span class="st b">BUST</span>';
    else if(p.frozen)st='<span class="st s">GELÉ</span>';
    else if(p.stayed)st='<span class="st s">RESTE</span>';
    chip.innerHTML=`${st}<div class="nm">${p.name}</div><div class="tot">${p.total}</div>`;
    sb.appendChild(chip);
  });

  $("turnBanner").innerHTML=g.msg||"";
  const me=g.players.find(p=>p.id===myId);
  const cur=g.players[g.turn];
  const myTurn=cur&&cur.id===myId&&g.phase==="play"&&!g.pending;

  // joueur "sous les projecteurs" = acteur d'une action en attente, sinon joueur courant
  const spot = g.pending ? g.players.find(p=>p.id===g.pending.actor) : cur;
  const spotIsMe = spot && spot.id===myId;

  // --- Spotlight (au-dessus) : main du joueur qui joue, seulement si ce n'est pas moi ---
  const spEl=$("spotlight"), spHand=$("spotHand");
  spHand.innerHTML="";
  if(spot && !spotIsMe && g.phase==="play"){
    spEl.classList.remove("empty");
    (spot.hand||[]).forEach(c=>spHand.appendChild(gameCardEl(c,true)));
    const sc=new Set(spot.hand.filter(c=>c.t==="num").map(c=>c.v)).size;
    $("spotLabel").innerHTML=`En train de jouer · <b>${spot.name}</b> — ${sc}/7 · ${liveScore(spot)} pts`;
  } else {
    spEl.classList.add("empty");
    $("spotLabel").innerHTML = myTurn ? "À toi de jouer" : "&nbsp;";
  }

  // --- Ma main (toujours visible, en bas) ---
  const hand=$("hand");hand.innerHTML="";
  (me?me.hand:[]).forEach(c=>hand.appendChild(gameCardEl(c)));

  // flip count + pips + points sur MA main
  const dn=me?new Set(me.hand.filter(c=>c.t==="num").map(c=>c.v)).size:0;
  $("flipCount").textContent=dn;
  const pips=$("pips");pips.innerHTML="";
  for(let i=0;i<7;i++){const p=document.createElement("div");p.className="pip"+(i<dn?" on":"");pips.appendChild(p);}
  $("roundPts").textContent=me?liveScore(me):0;

  // actions
  $("hitBtn").disabled=!myTurn;
  $("stayBtn").disabled=!myTurn;
  $("hitBtn").style.opacity=myTurn?1:.4;
  $("stayBtn").style.opacity=myTurn?1:.4;

  // résolution d'action (choix de cible) si je suis l'acteur
  if(g.pending && g.pending.actor===myId){
    showTargetPicker(g);
  } else clearOverlay();

  if(g.phase==="gameOver"){showGameOver(g);}
}
function liveScore(p){
  let sum=p.hand.filter(c=>c.t==="num").reduce((s,c)=>s+c.v,0);
  const mods=p.hand.filter(c=>c.t==="mod");
  if(mods.some(m=>m.mult))sum*=2;
  sum+=mods.filter(m=>!m.mult).reduce((s,m)=>s+m.v,0);
  if(p.flip7)sum+=15;
  return sum;
}

// ---------- Overlays ----------
function clearOverlay(){const r=$("overlayRoot");if(r.dataset.lock!=="end")r.innerHTML="";}
function showTargetPicker(g){
  const r=$("overlayRoot");
  const verb=g.pending.type==="freeze"?"geler":"faire tirer 3 cartes";
  const opts=g.players.filter(p=>!p.roundDone)
    .map(p=>`<button data-id="${p.id}">${p.name}${p.id===myId?" (toi)":""}</button>`).join("");
  r.innerHTML=`<div class="overlay"><div class="panel">
    <h3>${g.pending.type==="freeze"?"❄️ Freeze":"🎴 Flip 3"}</h3>
    <p class="hint">Choisis un joueur à ${verb}.</p>
    <div class="choose-target">${opts}</div></div></div>`;
  r.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    sendIntent({type:"pick",target:b.dataset.id});
    r.innerHTML="";
  });
}
function showGameOver(g){
  const r=$("overlayRoot");r.dataset.lock="end";
  r.innerHTML=`<div class="overlay"><div class="panel">
    <h3>🏆 Partie terminée</h3>
    <div class="big-num">${g.winner}</div>
    <p class="hint">remporte la partie.</p>
    ${isHost?'<button class="btn" id="againBtn">Rejouer</button>':'<p class="hint" style="margin-top:14px">En attente de l\'hôte…</p>'}
  </div></div>`;
  if(isHost)$("againBtn").onclick=()=>{r.dataset.lock="";r.innerHTML="";newGame(G.players.map(p=>({id:p.id,name:p.name})));};
}

// ---------- Intentions joueur ----------
function sendIntent(obj){
  if(isHost){ handleIntent(myId,obj); }
  else if(hostConn){ hostConn.send(obj); }
}
function handleIntent(fromId,obj){
  if(!G) return;
  if(obj.type==="hit")  hostHit(fromId);
  if(obj.type==="stay") hostStay(fromId);
  if(obj.type==="pick") hostPick(fromId,obj.target);
}

$("hitBtn").onclick=()=>sendIntent({type:"hit"});
$("stayBtn").onclick=()=>sendIntent({type:"stay"});

// =========================================================================
//  LOBBY / CONNEXIONS
// =========================================================================
let roster=[]; // hôte: [{id,name,online}]

function renderRoster(){
  const list=$("playerList");list.innerHTML="";
  roster.forEach((p,i)=>{
    const el=document.createElement("div");el.className="pl";
    el.innerHTML=`<span class="dot${p.online?"":" off"}"></span>${p.name}
      ${i===0?'<span class="host">HÔTE</span>':(p.id===myId?'<span class="you">TOI</span>':'')}`;
    list.appendChild(el);
  });
  if(isHost){
    $("startBtn").disabled=roster.length<2;
    $("waitHint").textContent=roster.length<2?"Il faut au moins 2 joueurs.":`${roster.length} joueurs connectés.`;
  }
}
function broadcastRoster(){broadcast({type:"roster",roster:roster.map(p=>({id:p.id,name:p.name,online:p.online}))});}

// ----- Créer (hôte) -----
$("createBtn").onclick=()=>{
  myName=($("name").value||"").trim()||"Hôte";
  isHost=true;
  const code=rid(5);
  peer=new Peer(PREFIX+code,{debug:1});
  peer.on("open",pid=>{
    myId=pid;
    roster=[{id:myId,name:myName,online:true}];
    $("home").classList.add("hidden");
    $("room").classList.remove("hidden");
    $("roomCode").textContent=code;
    $("startBtn").classList.remove("hidden");
    drawQR(code);
    renderRoster();
  });
  peer.on("connection",setupHostConn);
  peer.on("error",e=>{toast("Erreur : "+e.type);if(e.type==="unavailable-id"){location.reload();}});
};

function setupHostConn(conn){
  conn.on("open",()=>{
    conn.on("data",d=>onHostData(conn,d));
  });
  conn.on("close",()=>{
    const p=roster.find(r=>r.id===conn.peer);if(p)p.online=false;
    delete conns[conn.peer];renderRoster();broadcastRoster();
  });
}
function onHostData(conn,d){
  if(d.type==="join"){
    conns[conn.peer]=conn;
    if(!roster.find(r=>r.id===conn.peer))
      roster.push({id:conn.peer,name:d.name||"Joueur",online:true});
    else {const p=roster.find(r=>r.id===conn.peer);p.online=true;p.name=d.name||p.name;}
    renderRoster();broadcastRoster();
    if(G){conn.send(snapshot());} // partie déjà lancée -> envoyer l'état
  }
  else { handleIntent(conn.peer,d); } // hit/stay/pick
}

// ----- Rejoindre (client) -----
$("joinBtn").onclick=()=>joinGame(($("joinCode").value||"").trim().toUpperCase());
function joinGame(code){
  if(code.length<5){toast("Code à 5 caractères");return;}
  myName=($("name").value||"").trim()||"Joueur";
  isHost=false;
  peer=new Peer({debug:1});
  peer.on("open",pid=>{
    myId=pid;
    hostConn=peer.connect(PREFIX+code,{reliable:true});
    hostConn.on("open",()=>{
      hostConn.send({type:"join",name:myName});
      $("home").classList.add("hidden");
      $("room").classList.remove("hidden");
      $("roomCode").textContent=code;
      $("startBtn").classList.add("hidden");
      $("qr").classList.add("hidden");
      $("roomHint").textContent="Connecté ! En attente du lancement par l'hôte…";
    });
    hostConn.on("data",onClientData);
    hostConn.on("close",()=>toast("Connexion à l'hôte perdue"));
  });
  peer.on("error",e=>{
    if(e.type==="peer-unavailable")toast("Partie introuvable. Vérifie le code.");
    else toast("Erreur : "+e.type);
  });
}
function onClientData(d){
  if(d.type==="roster"){roster=d.roster;renderRoster();}
  else if(d.type==="state"){applyState(d.g);}
}

// ----- Démarrer (hôte) -----
$("startBtn").onclick=()=>{
  if(roster.filter(r=>r.online).length<2){toast("Au moins 2 joueurs");return;}
  newGame(roster.filter(r=>r.online).map(p=>({id:p.id,name:p.name})));
};

// ----- QR -----
function drawQR(code){
  const url=location.href.split("#")[0].split("?")[0]+"?join="+code;
  $("qr").innerHTML="";
  if(typeof QRCode==="undefined"){console.warn("QRCode lib manquante");$("qr").classList.add("hidden");return;}
  new QRCode($("qr"),{text:url,width:180,height:180,
    colorDark:"#0d1f17",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});
}

// ----- Auto-join depuis QR (?join=CODE) -----
window.addEventListener("load",()=>{
  const m=new URLSearchParams(location.search).get("join");
  if(m){$("joinCode").value=m.toUpperCase();$("name").focus();
    toast("Entre ton pseudo puis Rejoindre");}
});

// ----- Service worker minimal (offline shell) -----
if("serviceWorker"in navigator){
  const sw=`self.addEventListener("install",e=>self.skipWaiting());
    self.addEventListener("activate",e=>self.clients.claim());
    self.addEventListener("fetch",e=>{});`;
  const url=URL.createObjectURL(new Blob([sw],{type:"text/javascript"}));
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>
